apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ../kompose99 convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: api-gateway
  name: api-gateway
  namespace: demo-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api-gateway
  template:
    metadata:
      annotations:
        kompose.cmd: ../kompose99 convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: api-gateway
    spec:
      containers:
        - env:
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
              value: DEBUG
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING.SECURITY.OAUTH2.RESOURCESERVER.JWT.ISSUER-URI
              value: http://keycloak:8080/realms/spring-boot-micro-services-realm
            - name: EUREKA.CLIENT.SERVICE-URL.DEFAULTZONE
              value: http://discovery-server.demo-ns.svc.cluster.local:8762/eureka
            - name: MANAGEMENT.OTLP.METRICS.EXPORT.URL
              value: http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/metrics
            - name: MANAGEMENT.OPENTELEMETRY.TRACING.EXPORT.OTLP.ENDPOINT
              value: http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/traces
            - name: MANAGEMENT.OPENTELEMETRY.LOGGING.EXPORT.OTLP.ENDPOINT
              value: http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/logs
          image: irfanmubasyir96/api-gateway:latest
          name: api-gateway
          ports:
            - containerPort: 8888
              protocol: TCP
      restartPolicy: Always
