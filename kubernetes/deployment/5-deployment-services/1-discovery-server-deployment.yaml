apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ../kompose99 convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: discovery-server
  name: discovery-server
  namespace: demo-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: discovery-server
  template:
    metadata:
      annotations:
        kompose.cmd: ../kompose99 convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: discovery-server
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: MANAGEMENT.OTLP.METRICS.EXPORT.URL
              value: http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/metrics
            - name: MANAGEMENT.OPENTELEMETRY.TRACING.EXPORT.OTLP.ENDPOINT
              value:  http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/traces
            - name: MANAGEMENT.OPENTELEMETRY.LOGGING.EXPORT.OTLP.ENDPOINT
              value: http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/logs
          image: irfanmubasyir96/discovery-server:latest
          name: discovery-server
          ports:
            - containerPort: 8762
              protocol: TCP
      restartPolicy: Always
