apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ../kompose99 convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: postgres-order
  name: postgres-order
  namespace: demo-ns

spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres-order
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: ../kompose99 convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: postgres-order
    spec:
      containers:
        - args:
            - -p
            - "5431"
          env:
            - name: PG_DATA
              value: /data/postgres
            - name: POSTGRES_DB
              value: order-service
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_USER
              value: admin
          image: postgres
          name: postgres-order
          ports:
            - containerPort: 5431
              protocol: TCP
          volumeMounts:
            - mountPath: /data/postgres
              name: postgres-order-claim0
      restartPolicy: Always
      volumes:
        - name: postgres-order-claim0
          persistentVolumeClaim:
            claimName: postgres-order-claim0
