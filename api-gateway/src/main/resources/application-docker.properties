eureka.client.service-url.defaultZone=http://discovery-server:8762/eureka
server.port=8888

#Product Service Route
spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product

#Order Service Route
spring.cloud.gateway.server.webmvc.routes[1].id=order-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/order

#Inventory Service Route
spring.cloud.gateway.server.webmvc.routes[2].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/inventory

#Inventory Service Route 2
spring.cloud.gateway.server.webmvc.routes[3].id=inventory-service-2
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/inventory/**

#Discovery Server Route
spring.cloud.gateway.server.webmvc.routes[4].id=discovery-server
spring.cloud.gateway.server.webmvc.routes[4].uri=http://localhost:8762
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/eureka/web
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=SetPath=/

#Discovery Server Static Resources Route
spring.cloud.gateway.server.webmvc.routes[5].id=static
spring.cloud.gateway.server.webmvc.routes[5].uri=http://localhost:8762
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/eureka/**

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/spring-boot-micro-services-realm

