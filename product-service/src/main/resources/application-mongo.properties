spring.application.name=product-service
#spring.data.mongodb.uri=mongodb://mongouser:mongopassword@localhost:27017/product-service?authSource=admin
#spring.data.mongodb.host=JIHAD++
spring.data.mongodb.port=27017
spring.data.mongodb.database=product-service
#spring.data.mongodb.username=mongouser
#spring.data.mongodb.password=mongopassword
#spring.data.mongodb.authentication-database=admin

spring.data.mongodb.uri=mongodb://mongodb-irfan:27017/product-service

server.port=8087
eureka.client.service-url.defaultZone=http://discovery-server:8762/eureka
eureka.instance.prefer-ip-address=true

management.otlp.metrics.export.url=http://grafana-lgtm:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://grafana-lgtm:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://grafana-lgtm:4318/v1/logs
management.tracing.sampling.probability=1.0

logging.level.com.irfan=INFO
logging.level.org.springframework.boot.actuator.autoconfigure.opentelemetry=INFO
logging.level.org.springframework.boot.docker.compose=INFO
