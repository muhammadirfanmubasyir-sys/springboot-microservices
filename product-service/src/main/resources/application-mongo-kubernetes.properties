spring.application.name=product-service
#spring.mongodb.uri=mongodb://mongouser:mongopassword@localhost:27017/product-service?authSource=admin
spring.mongodb.host=mongodb-irfan
spring.mongodb.port=27017
spring.mongodb.database=product-service
spring.mongodb.username=mongouser
spring.mongodb.password=mongopassword
spring.mongodb.authentication-database=admin

#spring.data.mongodb.uri=mongodb://mongodb-irfan.demo-ns.svc.cluster.local:27017/product-service?authSource=admin

server.port=8087
eureka.client.service-url.defaultZone=http://discovery-server.demo-ns.svc.cluster.local:8762/eureka
eureka.instance.prefer-ip-address=true

management.otlp.metrics.export.url=http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/traces
management.opentelemetry.logging.export.otlp.endpoint=http://grafana-lgtm.demo-ns.svc.cluster.local:4318/v1/logs
management.tracing.sampling.probability=1.0

logging.level.com.irfan=INFO
logging.level.org.springframework.boot.actuator.autoconfigure.opentelemetry=INFO
logging.level.org.springframework.boot.docker.compose=INFO
