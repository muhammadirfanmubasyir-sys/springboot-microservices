version: '4'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
  #    MONGO_INITDB_ROOT_USERNAME: mongouser
  #    MONGO_INITDB_ROOT_PASSWORD: mongopassword
      MONGO_INITDB_DATABASE: product-service
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data: